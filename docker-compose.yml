# Local + demo deployment: Postgres + the app.
#   docker compose up --build
# The app waits for Postgres to be healthy, runs migrations on boot, and (with
# SEED_ON_START=true) seeds the demo account on first run.
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: atexili
      POSTGRES_PASSWORD: atexili
      POSTGRES_DB: atexili
    ports:
      - "5432:5432"
    volumes:
      - atexili-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atexili -d atexili"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://atexili:atexili@db:5432/atexili?schema=public
      # Override these for anything real:
      JWT_SECRET: change-me-in-production
      SEED_ON_START: "true"
      # S3 photo storage (optional — leave unset to use placeholder photos):
      # S3_BUCKET: ""
      # S3_REGION: ""
      # S3_ACCESS_KEY_ID: ""
      # S3_SECRET_ACCESS_KEY: ""
      # S3_ENDPOINT: ""
      # S3_PUBLIC_URL: ""
      # S3_FORCE_PATH_STYLE: ""
    ports:
      - "3000:3000"

volumes:
  atexili-db:
